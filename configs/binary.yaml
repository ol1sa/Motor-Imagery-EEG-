# Full binary experiment: left-fist vs right-fist MOTOR IMAGERY (runs 4, 8, 12).
# This is the heavy, all-subjects configuration. Run within-subject and LOSO via
#   python -m mibci.run --config configs/binary.yaml --experiment binary --cv within
#   python -m mibci.run --config configs/binary.yaml --experiment binary --cv loso
name: full

data:
  subjects: all              # 1..109; known-bad subjects are excluded + logged
  runs_binary: [4, 8, 12]    # imagined left/right fist
  runs_fourclass: [6, 10, 14]
  exclude_known_bad: true
  expected_sfreq: 160.0

preprocess:
  l_freq: 8.0                # mu rhythm onset
  h_freq: 30.0               # beta rhythm upper edge
  notch_freq: 60.0           # US mains
  interpolate_bads: true
  bad_channel_zscore: 4.0
  apply_car: true

ica:
  enabled: true
  n_components: 0.95
  fit_l_freq: 1.0
  method: fastica
  eog_proxy_channels: [Fp1, Fp2]
  eog_z_threshold: 3.0
  flag_muscle: true
  muscle_threshold: 0.6
  max_pca_components: 25

epoch:
  tmin: -0.5                 # pre-cue slice for baseline
  tmax: 4.0                  # imagery window
  baseline_start: -0.5
  baseline_end: 0.0
  reject_uv: 200.0           # p2p reject; pairs with bad-channel interpolation

cv:
  scheme: within
  within_folds: 5

model:
  names: [csp_lda, csp_svm, riemann_lr, eegnet, denoising_eegnet]
  csp_components: 6
  svm_c: 1.0
  svm_gamma: scale
  deep:
    epochs: 100
    batch_size: 32
    lr: 0.001
    f1: 8
    d: 2
    kernel_length: 64
    dropout: 0.5
    ae_pretrain_epochs: 30
    ae_noise_std: 0.2
    ae_latent_channels: 16

seed: 42
n_jobs: 1
artifacts_dir: artifacts
