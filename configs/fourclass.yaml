# 4-class experiment: imagined left fist / right fist / both fists / both feet.
# NOTE: this needs BOTH run groups — runs 4/8/12 give left vs right fist, runs
# 6/10/14 give both-fists vs both-feet. The loader combines them automatically.
#   python -m mibci.run --config configs/fourclass.yaml --experiment fourclass --cv within
name: full

data:
  subjects: all
  runs_binary: [4, 8, 12]    # left/right fist
  runs_fourclass: [6, 10, 14]  # both fists / both feet
  exclude_known_bad: true
  expected_sfreq: 160.0

preprocess:
  l_freq: 8.0
  h_freq: 30.0
  notch_freq: 60.0
  interpolate_bads: true
  bad_channel_zscore: 4.0
  apply_car: true

ica:
  enabled: true
  n_components: 0.95
  fit_l_freq: 1.0
  method: fastica
  eog_proxy_channels: [Fp1, Fp2]
  eog_z_threshold: 3.0
  flag_muscle: true
  muscle_threshold: 0.6
  max_pca_components: 25

epoch:
  tmin: -0.5
  tmax: 4.0
  baseline_start: -0.5
  baseline_end: 0.0
  reject_uv: 200.0           # p2p reject; pairs with bad-channel interpolation

cv:
  scheme: within
  within_folds: 5

model:
  names: [csp_lda, csp_svm, riemann_lr, eegnet, denoising_eegnet]
  csp_components: 8          # more filters help the harder 4-class problem
  svm_c: 1.0
  svm_gamma: scale
  deep:
    epochs: 100
    batch_size: 32
    lr: 0.001
    f1: 8
    d: 2
    kernel_length: 64
    dropout: 0.5
    ae_pretrain_epochs: 30
    ae_noise_std: 0.2
    ae_latent_channels: 16

seed: 42
n_jobs: 1
artifacts_dir: artifacts
