# Fast end-to-end sanity check on a few subjects. NOT a benchmark — the deep
# models train for only a couple of epochs so the whole pipeline runs in minutes.
#   python -m mibci.run --config configs/smoke.yaml --experiment binary
name: smoke

data:
  subjects: [1, 2, 3, 4]     # tiny cohort
  runs_binary: [4, 8, 12]
  runs_fourclass: [6, 10, 14]
  exclude_known_bad: true
  expected_sfreq: 160.0

preprocess:
  l_freq: 8.0
  h_freq: 30.0
  notch_freq: 60.0
  interpolate_bads: true
  bad_channel_zscore: 4.0
  apply_car: true

ica:
  enabled: true
  n_components: 0.95
  fit_l_freq: 1.0
  method: fastica
  eog_proxy_channels: [Fp1, Fp2]
  eog_z_threshold: 3.0
  flag_muscle: true
  muscle_threshold: 0.6
  max_pca_components: 15

epoch:
  tmin: -0.5
  tmax: 4.0
  baseline_start: -0.5
  baseline_end: 0.0
  reject_uv: 200.0           # p2p reject; pairs with bad-channel interpolation

cv:
  scheme: within
  within_folds: 2            # minimal folds for speed

model:
  names: [csp_lda, csp_svm, riemann_lr, eegnet, denoising_eegnet]
  csp_components: 4
  svm_c: 1.0
  svm_gamma: scale
  deep:
    epochs: 3                # tiny — just prove the training loop runs
    batch_size: 16
    lr: 0.001
    f1: 8
    d: 2
    kernel_length: 64
    dropout: 0.5
    ae_pretrain_epochs: 2
    ae_noise_std: 0.2
    ae_latent_channels: 8

seed: 42
n_jobs: 1
artifacts_dir: artifacts
